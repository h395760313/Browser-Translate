<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能翻译助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #ffffff;
      color: #333;
    }

    /* 头部 */
    .popup-header {
      background: linear-gradient(135deg, #4a90d9, #357abd);
      color: white;
      padding: 16px 20px;
    }

    .popup-header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .popup-header p {
      font-size: 12px;
      opacity: 0.9;
    }

    /* 主内容 */
    .popup-content {
      padding: 16px;
    }

    .input-group {
      margin-bottom: 12px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
      font-weight: 500;
    }

    textarea {
      width: 100%;
      height: 80px;
      padding: 10px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: #4a90d9;
    }

    .lang-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .lang-selector select {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 13px;
      background: white;
      cursor: pointer;
    }

    .lang-selector select:focus {
      outline: none;
      border-color: #4a90d9;
    }

    .lang-arrow {
      font-size: 16px;
      color: #999;
    }

    .translate-btn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #4a90d9, #357abd);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .translate-btn:hover {
      opacity: 0.9;
    }

    .translate-btn:active {
      transform: scale(0.98);
    }

    .translate-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* 结果区域 */
    .result-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #eee;
    }

    .result-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .result-text {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.6;
      min-height: 60px;
      word-break: break-word;
    }

    .result-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .result-actions button {
      flex: 1;
      padding: 8px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      background: white;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }

    .result-actions button:hover {
      background: #f5f5f5;
    }

    /* 加载状态 */
    .loading {
      display: none;
      text-align: center;
      padding: 20px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #e0e0e0;
      border-top-color: #4a90d9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 错误提示 */
    .error-msg {
      display: none;
      color: #e53935;
      font-size: 13px;
      margin-top: 8px;
      text-align: center;
    }

    .error-msg.show {
      display: block;
    }

    /* 页脚 */
    .popup-footer {
      padding: 12px 16px;
      background: #f8f9fa;
      text-align: center;
      font-size: 11px;
      color: #999;
    }

    /* 设置区域 */
    .settings-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #eee;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .setting-row:last-child {
      margin-bottom: 0;
    }

    .setting-label {
      font-size: 13px;
      color: #333;
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      background: #ccc;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-switch.active {
      background: #4a90d9;
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle-switch.active::after {
      transform: translateX(20px);
    }

    .shortcut-input {
      width: 100px;
      padding: 6px 10px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
    }

    .shortcut-input:focus {
      outline: none;
      border-color: #4a90d9;
    }

    .shortcut-error {
      font-size: 11px;
      color: #e53935;
      margin-top: 4px;
      display: none;
    }

    .shortcut-error.show {
      display: block;
    }

    .screenshot-btn {
      width: 100%;
      padding: 10px;
      background: #f0f5ff;
      color: #4a90d9;
      border: 1px solid #4a90d9;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .screenshot-btn:hover {
      background: #4a90d9;
      color: white;
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <h1>智能翻译助手</h1>
    <p>选中文本自动翻译 · 支持TTS朗读</p>
  </div>

  <div class="popup-content">
    <div class="input-group">
      <label>输入文本</label>
      <textarea id="input-text" placeholder="输入要翻译的文本..."></textarea>
    </div>

    <div class="lang-selector">
      <select id="from-lang">
        <option value="auto">自动检测</option>
        <option value="zh">中文</option>
        <option value="en">英文</option>
      </select>
      <span class="lang-arrow">→</span>
      <select id="to-lang">
        <option value="en">英文</option>
        <option value="zh">中文</option>
      </select>
    </div>

    <button class="translate-btn" id="translate-btn">翻译</button>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span>翻译中...</span>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="result-section" id="result-section" style="display: none;">
      <div class="result-label">译文</div>
      <div class="result-text" id="result-text"></div>
      <div class="result-actions">
        <button id="btn-tts">🔊 朗读</button>
        <button id="btn-copy">📋 复制</button>
      </div>
    </div>

    <div class="settings-section">
      <button class="screenshot-btn" id="screenshot-btn">
        📷 截图翻译
      </button>
    </div>

    <div class="settings-section">
      <div class="setting-row">
        <span class="setting-label">划词自动翻译</span>
        <div class="toggle-switch" id="auto-translate-toggle"></div>
      </div>
      <div class="setting-row">
        <span class="setting-label">截图快捷键</span>
        <div>
          <input type="text" class="shortcut-input" id="screenshot-shortcut" placeholder="Ctrl+Shift+X" readonly>
          <div class="shortcut-error" id="shortcut-error">快捷键已被占用</div>
        </div>
      </div>
    </div>
  </div>

  <div class="popup-footer">
    基于 MyMemory API · 支持中英互译
  </div>

  <script src="popup.js"></script>
</body>
</html>
